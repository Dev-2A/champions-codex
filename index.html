<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="포켓몬 챔피언스 뉴비를 위한 정보·DB 허브. 타입 상성, 도감, 팀 빌더까지 한 곳에서."
    />
    <link rel="icon" href="/champions-codex/pokeball.svg" />
    <link rel="apple-touch-icon" href="/champions-codex/icon-192.png" />
    <title>🏆 Champions Codex</title>

    <!-- SNS 공유용 Open Graph · Twitter 카드 (크롤러는 절대 URL만 읽음) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Champions Codex" />
    <meta property="og:title" content="🏆 Champions Codex — 포켓몬 챔피언스 뉴비 허브" />
    <meta
      property="og:description"
      content="타입 상성, 사용 가능 포켓몬 도감, 팀 빌더·데미지 계산까지. 챔피언스를 처음 접한 사람을 위한 정보·DB 허브."
    />
    <meta property="og:url" content="https://dev-2a.github.io/champions-codex/" />
    <meta
      property="og:image"
      content="https://dev-2a.github.io/champions-codex/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🏆 Champions Codex — 포켓몬 챔피언스 뉴비 허브" />
    <meta
      name="twitter:description"
      content="타입 상성, 도감, 팀 빌더·데미지 계산까지. 챔피언스 뉴비 정보·DB 허브."
    />
    <meta
      name="twitter:image"
      content="https://dev-2a.github.io/champions-codex/og-image.png"
    />

    <!-- 라이트모드 기본값 + 무플래시 초기화 (토글이 cc-theme를 갱신) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("cc-theme");
          if (t === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark"); // 기본: 라이트
        } catch (e) {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>

    <!-- GoatCounter 방문 통계 (해시 라우터라 자동 카운트 끄고 수동 전송) -->
    <script>
      window.goatcounter = { no_onload: true };
    </script>
    <script
      async
      src="https://gc.zgo.at/count.js"
      data-goatcounter="https://champions-codex.goatcounter.com/count"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
