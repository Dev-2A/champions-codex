<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="포켓몬 챔피언스 뉴비를 위한 정보·DB 허브. 타입 상성, 도감, 팀 빌더까지 한 곳에서."
    />
    <title>🏆 Champions Codex</title>

    <!-- 다크모드 기본값 + 무플래시 초기화 (Step 5의 토글이 cc-theme를 갱신) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("cc-theme");
          if (t === "light") document.documentElement.classList.remove("dark");
          else document.documentElement.classList.add("dark"); // 기본: 다크
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
